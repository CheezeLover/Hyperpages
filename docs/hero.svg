<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0D1526"/>
    <stop offset="100%" stop-color="#1A2540"/>
  </linearGradient>
  <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#FF6B35"/>
    <stop offset="100%" stop-color="#FF9E6B"/>
  </linearGradient>
  <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#3B82F6"/>
    <stop offset="100%" stop-color="#60A5FA"/>
  </linearGradient>
  <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#059669"/>
    <stop offset="100%" stop-color="#34D399"/>
  </linearGradient>
  <radialGradient id="centerGlow" cx="50%" cy="20%" r="50%">
    <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#0D1526" stop-opacity="0"/>
  </radialGradient>
  <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
    <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
  </filter>
</defs>

<!-- Background -->
<rect width="900" height="420" fill="url(#bg)"/>
<rect width="900" height="420" fill="url(#centerGlow)"/>

<!-- Top accent bar -->
<rect x="0" y="0" width="900" height="4" fill="url(#orangeGrad)"/>

<!-- Title -->
<text x="450" y="72" text-anchor="middle" font-size="52" font-weight="800" letter-spacing="-2" fill="url(#orangeGrad)">HYPERSET</text>
<text x="450" y="96" text-anchor="middle" font-size="11.5" letter-spacing="5" fill="#475569">SELF-HOSTED  ·  ANALYTICS  ·  PORTAL</text>
<text x="450" y="128" text-anchor="middle" font-size="16" font-weight="300" fill="#94A3B8">One domain. One login. One clean interface for your entire data stack.</text>

<!-- Separator -->
<line x1="340" y1="148" x2="440" y2="148" stroke="#1E293B" stroke-width="1.5"/>
<circle cx="450" cy="148" r="3" fill="#FF6B35"/>
<line x1="460" y1="148" x2="560" y2="148" stroke="#1E293B" stroke-width="1.5"/>

<!-- ═══ CARD 1: AI Chat ═══ -->
<rect x="60" y="168" width="238" height="218" rx="16" fill="#162032" stroke="#FF6B3520" stroke-width="1.5" filter="url(#cardShadow)"/>
<rect x="60" y="168" width="238" height="4" rx="2" fill="url(#orangeGrad)"/>
<circle cx="127" cy="215" r="26" fill="#FF6B3510" stroke="#FF6B3530" stroke-width="1.5"/>
<rect x="115" y="204" width="18" height="13" rx="4" fill="none" stroke="#FF6B35" stroke-width="1.5"/>
<path d="M 118 217 L 114 223 L 122 217 Z" fill="#FF6B35"/>
<rect x="124" y="208" width="14" height="10" rx="3" fill="#FF6B35" opacity="0.5"/>
<rect x="152" y="206" width="24" height="15" rx="7" fill="#FF6B35"/>
<text x="164" y="217" text-anchor="middle" font-size="8.5" font-weight="700" fill="white">AI</text>
<text x="179" y="255" text-anchor="middle" font-size="19" font-weight="700" fill="#F1F5F9">AI Chat</text>
<text x="179" y="273" text-anchor="middle" font-size="11" fill="#64748B">Talk to your data</text>
<line x1="90" y1="286" x2="268" y2="286" stroke="#1E3050" stroke-width="1"/>
<text x="179" y="304" text-anchor="middle" font-size="11" fill="#94A3B8">Ask questions in plain English.</text>
<text x="179" y="320" text-anchor="middle" font-size="11" fill="#94A3B8">Get auto-generated charts</text>
<text x="179" y="336" text-anchor="middle" font-size="11" fill="#94A3B8">and insights instantly.</text>
<rect x="116" y="353" width="126" height="21" rx="10" fill="#FF6B3510" stroke="#FF6B3530" stroke-width="1"/>
<text x="179" y="368" text-anchor="middle" font-size="10" fill="#FF8A5C">Any OpenAI-compatible LLM</text>

<!-- ═══ CARD 2: Analytics ═══ -->
<rect x="331" y="168" width="238" height="218" rx="16" fill="#162032" stroke="#3B82F620" stroke-width="1.5" filter="url(#cardShadow)"/>
<rect x="331" y="168" width="238" height="4" rx="2" fill="url(#blueGrad)"/>
<circle cx="398" cy="215" r="26" fill="#3B82F610" stroke="#3B82F630" stroke-width="1.5"/>
<rect x="387" y="222" width="7" height="9" fill="#3B82F6" rx="1"/>
<rect x="397" y="214" width="7" height="17" fill="#3B82F6" rx="1"/>
<rect x="407" y="217" width="7" height="14" fill="#3B82F6" rx="1"/>
<line x1="384" y1="232" x2="418" y2="232" stroke="#3B82F6" stroke-width="1.5"/>
<rect x="423" y="206" width="60" height="15" rx="7" fill="#3B82F6"/>
<text x="453" y="217" text-anchor="middle" font-size="8.5" font-weight="700" fill="white">SUPERSET</text>
<text x="450" y="255" text-anchor="middle" font-size="19" font-weight="700" fill="#F1F5F9">Analytics</text>
<text x="450" y="273" text-anchor="middle" font-size="11" fill="#64748B">Apache Superset built-in</text>
<line x1="361" y1="286" x2="539" y2="286" stroke="#1E3050" stroke-width="1"/>
<text x="450" y="304" text-anchor="middle" font-size="11" fill="#94A3B8">Full dashboards, charts</text>
<text x="450" y="320" text-anchor="middle" font-size="11" fill="#94A3B8">and SQL Lab — accessed</text>
<text x="450" y="336" text-anchor="middle" font-size="11" fill="#94A3B8">with zero-click SSO.</text>
<rect x="387" y="353" width="126" height="21" rx="10" fill="#3B82F610" stroke="#3B82F630" stroke-width="1"/>
<text x="450" y="368" text-anchor="middle" font-size="10" fill="#60A5FA">Automatic SSO · No re-login</text>

<!-- ═══ CARD 3: Custom Pages ═══ -->
<rect x="602" y="168" width="238" height="218" rx="16" fill="#162032" stroke="#05966920" stroke-width="1.5" filter="url(#cardShadow)"/>
<rect x="602" y="168" width="238" height="4" rx="2" fill="url(#greenGrad)"/>
<circle cx="669" cy="215" r="26" fill="#05966910" stroke="#05966930" stroke-width="1.5"/>
<rect x="658" y="203" width="22" height="26" rx="3" fill="none" stroke="#059669" stroke-width="1.5"/>
<line x1="662" y1="211" x2="676" y2="211" stroke="#059669" stroke-width="1.5"/>
<line x1="662" y1="216" x2="676" y2="216" stroke="#059669" stroke-width="1.5"/>
<line x1="662" y1="221" x2="671" y2="221" stroke="#059669" stroke-width="1.5"/>
<rect x="693" y="206" width="44" height="15" rx="7" fill="#059669"/>
<text x="715" y="217" text-anchor="middle" font-size="8.5" font-weight="700" fill="white">&lt;/&gt; HTML</text>
<text x="721" y="255" text-anchor="middle" font-size="19" font-weight="700" fill="#F1F5F9">Custom Pages</text>
<text x="721" y="273" text-anchor="middle" font-size="11" fill="#64748B">Drop-in extensions</text>
<line x1="632" y1="286" x2="810" y2="286" stroke="#1E3050" stroke-width="1"/>
<text x="721" y="304" text-anchor="middle" font-size="11" fill="#94A3B8">Add HTML pages with an</text>
<text x="721" y="320" text-anchor="middle" font-size="11" fill="#94A3B8">optional Python backend.</text>
<text x="721" y="336" text-anchor="middle" font-size="11" fill="#94A3B8">Zero shared code changes.</text>
<rect x="658" y="353" width="126" height="21" rx="10" fill="#05966910" stroke="#05966930" stroke-width="1"/>
<text x="721" y="368" text-anchor="middle" font-size="10" fill="#34D399">Hot-reload on file change</text>

<!-- Footer -->
<text x="450" y="407" text-anchor="middle" font-size="10.5" fill="#334155">Self-hosted · No telemetry · No cloud lock-in · Runs on any Podman / Docker host · MIT License</text>
</svg>
