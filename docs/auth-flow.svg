<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 296" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
<defs>
  <marker id="arr"      markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#94A3B8"/></marker>
  <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3B82F6"/></marker>
  <marker id="arr-org"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#D97706"/></marker>
</defs>

<rect width="950" height="296" fill="#F8FAFC"/>

<!-- Title -->
<text x="475" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#0F172A">Authentication Flow — JWT Verification &amp; Header Injection</text>

<!-- ── Browser ── -->
<rect x="30" y="76" width="134" height="86" rx="8" fill="white" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="97"  y="104" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Browser</text>
<text x="97"  y="121" text-anchor="middle" font-size="10" fill="#94A3B8">User session</text>
<text x="97"  y="136" text-anchor="middle" font-size="10" fill="#94A3B8">auth cookie</text>

<!-- Arrow: Browser → Caddy -->
<line x1="164" y1="119" x2="228" y2="119" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="196" y="111" text-anchor="middle" font-size="9.5" fill="#64748B">HTTPS</text>

<!-- ── Caddy ── (y=50 to y=206) -->
<rect x="230" y="50" width="244" height="156" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
<text x="352" y="76"  text-anchor="middle" font-size="14" font-weight="700"  fill="#1D4ED8">Caddy</text>
<text x="352" y="95"  text-anchor="middle" font-size="10.5"                   fill="#475569">Verifies JWT / auth cookie</text>
<text x="352" y="112" text-anchor="middle" font-size="10.5"                   fill="#475569">Extracts user identity</text>
<line x1="250" y1="122" x2="454" y2="122" stroke="#BFDBFE" stroke-width="1"/>
<text x="352" y="139" text-anchor="middle" font-size="10"   font-weight="600" fill="#3B82F6">Injects headers on every upstream request</text>
<text x="352" y="156" text-anchor="middle" font-size="9.5"                    fill="#64748B">X-Token-User-*  for portal services</text>
<text x="352" y="172" text-anchor="middle" font-size="9.5"                    fill="#64748B">X-Webauth-*  for Superset</text>

<!-- ── Upper arrow: Caddy → Portal/Services (at y=89, centre of upper box) ── -->
<line x1="474" y1="89" x2="578" y2="89" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
<text x="526" y="81" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3B82F6">X-Token-User-*</text>

<!-- ── Lower arrow: Caddy → Superset (at y=201, centre of lower box) ── -->
<line x1="474" y1="201" x2="578" y2="201" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr-org)"/>
<text x="526" y="216" text-anchor="middle" font-size="9.5" font-weight="600" fill="#D97706">X-Webauth-*</text>

<!-- ── Portal · Pages · MCP box (y=46 to y=132, centre y=89) ── -->
<rect x="580" y="46" width="220" height="86" rx="8" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
<text x="690" y="68"  text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF">Portal · Pages · MCP</text>
<line x1="600" y1="77" x2="780" y2="77" stroke="#BFDBFE" stroke-width="1"/>
<text x="690" y="92"  text-anchor="middle" font-size="10" fill="#475569">X-Token-User-Id</text>
<text x="690" y="107" text-anchor="middle" font-size="10" fill="#475569">X-Token-User-Email · X-Token-User-Roles</text>
<text x="690" y="122" text-anchor="middle" font-size="9.5" font-weight="600" fill="#16A34A">Used for identity &amp; role checks</text>

<!-- ── Superset box (y=158 to y=244, centre y=201) ── -->
<rect x="580" y="158" width="220" height="86" rx="8" fill="white" stroke="#D97706" stroke-width="1.5"/>
<text x="690" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">Superset</text>
<line x1="600" y1="189" x2="780" y2="189" stroke="#FED7AA" stroke-width="1"/>
<text x="690" y="204" text-anchor="middle" font-size="10" fill="#475569">X-Webauth-User · X-Webauth-Email</text>
<text x="690" y="219" text-anchor="middle" font-size="10" fill="#475569">X-Webauth-Groups</text>
<text x="690" y="234" text-anchor="middle" font-size="9.5" font-weight="600" fill="#92400E">AUTH_REMOTE_USER — trusted unconditionally</text>

<!-- ── Security note ── -->
<rect x="30" y="258" width="890" height="30" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
<text x="475" y="276" text-anchor="middle" font-size="10" fill="#7F1D1D">
  <tspan font-weight="700" fill="#DC2626">⚠ Security: </tspan>
  <tspan>Superset trusts X-Webauth-User unconditionally — never expose it directly to the internet. All access must flow through Caddy.</tspan>
</text>
</svg>
