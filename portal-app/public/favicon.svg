<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#A83200"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Back page — rotated left, semi-transparent -->
  <g transform="rotate(-18, 15, 17)">
    <rect x="5" y="5" width="14" height="18" rx="2" fill="rgba(255,255,255,0.30)"/>
  </g>

  <!-- Middle page — slight rotation -->
  <g transform="rotate(-7, 15, 17)">
    <rect x="6" y="4" width="14" height="18" rx="2" fill="rgba(255,255,255,0.55)"/>
  </g>

  <!-- Front page — upright, full white, with folded corner -->
  <g filter="url(#shadow)">
    <path d="M8 3 L21 3 L25 7 L25 26 L8 26 Z" fill="white"/>
    <path d="M21 3 L25 7 L21 7 Z" fill="rgba(160,50,0,0.20)"/>
  </g>

  <!-- Content lines on front page -->
  <rect x="11" y="11" width="9"  height="1.5" rx="0.75" fill="#E85A0E" opacity="0.7"/>
  <rect x="11" y="14" width="7"  height="1.5" rx="0.75" fill="#E85A0E" opacity="0.7"/>
  <rect x="11" y="17" width="8"  height="1.5" rx="0.75" fill="#E85A0E" opacity="0.7"/>
  <rect x="11" y="20" width="5"  height="1.5" rx="0.75" fill="#E85A0E" opacity="0.7"/>
</svg>
