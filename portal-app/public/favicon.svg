<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#A83200"/>
    </linearGradient>
  </defs>

  <!-- Background square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Slide frame -->
  <rect x="3" y="7" width="26" height="17" rx="2" fill="white" opacity="0.95"/>

  <!-- Title bar area -->
  <rect x="5" y="9" width="22" height="3.5" rx="1" fill="#E85A0E" opacity="0.85"/>

  <!-- Content lines -->
  <rect x="5" y="14.5" width="14" height="1.5" rx="0.75" fill="#E85A0E" opacity="0.5"/>
  <rect x="5" y="17"   width="10" height="1.5" rx="0.75" fill="#E85A0E" opacity="0.5"/>
  <rect x="5" y="19.5" width="12" height="1.5" rx="0.75" fill="#E85A0E" opacity="0.5"/>

  <!-- Decorative graphic block (chart placeholder) -->
  <rect x="20" y="14" width="7" height="7" rx="1" fill="#E85A0E" opacity="0.2"/>
  <rect x="21" y="18" width="1.5" height="2.5" rx="0.5" fill="#E85A0E" opacity="0.7"/>
  <rect x="23.2" y="16.5" width="1.5" height="4" rx="0.5" fill="#E85A0E" opacity="0.7"/>
  <rect x="25.4" y="15.5" width="1.5" height="5" rx="0.5" fill="#E85A0E" opacity="0.7"/>

  <!-- Stand / podium line -->
  <rect x="14" y="24" width="4" height="1.5" rx="0.75" fill="white" opacity="0.7"/>
  <rect x="11" y="25.5" width="10" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
</svg>
